name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy backend to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          command_timeout: 30m
          script_stop: true
          script: |
            set -e

            echo "Moving to backend repo..."
            cd /var/www/delivery/delivery-backend

            echo "Fixing backend file permissions..."
            DEPLOY_UID=$(id -u)
            DEPLOY_GID=$(id -g)

            docker run --rm \
              -v /var/www/delivery/delivery-backend:/app \
              alpine:3.20 \
              sh -c "chown -R ${DEPLOY_UID}:${DEPLOY_GID} /app"

            echo "Fixing backend git remote..."
            git remote set-url origin git@github.com:madhukar-tukaatu/delivery-backend.git || true

            echo "Pulling latest backend code..."
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            echo "Moving to deployment repo..."
            cd /var/www/delivery/delivery-deployment

            echo "Building backend containers..."
            docker compose --env-file .env.production build --no-cache backend-app backend-nginx backend-queue backend-scheduler backend-reverb

            echo "Starting backend containers..."
            docker compose --env-file .env.production up -d backend-app backend-nginx backend-queue backend-scheduler backend-reverb

            echo "Running migrations..."
            docker compose --env-file .env.production exec -T backend-app php artisan migrate --force

            echo "Clearing Laravel cache..."
            docker compose --env-file .env.production exec -T backend-app php artisan optimize:clear

            echo "Caching Laravel config..."
            docker compose --env-file .env.production exec -T backend-app php artisan config:cache

            echo "Clearing routes and views..."
            docker compose --env-file .env.production exec -T backend-app php artisan route:clear || true
            docker compose --env-file .env.production exec -T backend-app php artisan view:clear || true

            echo "Restarting workers..."
            docker compose --env-file .env.production restart backend-queue backend-scheduler backend-reverb || true

            echo "Checking backend containers..."
            docker ps --filter "name=delivery-backend"

            echo "Backend deploy completed."